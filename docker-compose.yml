services:
  db:
    image: postgres:16-alpine
    container_name: netflix-rag-db
    environment:
      POSTGRES_DB: netflix_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d netflix_rag"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
    container_name: netflix-rag-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/netflix_rag
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: netflix-rag-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - '5173:5173'
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
