services:
  db:
    image: postgres:16-alpine
    container_name: netflix-rag-db
    environment:
      POSTGRES_DB: netflix_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d netflix_rag"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1g

  backend:
    build:
      context: ./backend
    container_name: netflix-rag-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/netflix_rag
      FAISS_INDEX_PATH: /app/data/netflix.faiss
      FAISS_METADATA_CSV_PATH: /app/data/netflix_with_embeddings.csv
    volumes:
      - ./data:/app/data
    ports:
      - '8000:8000'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2g

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: netflix-rag-frontend
    ports:
      - '5173:80'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512m

volumes:
  postgres_data:
